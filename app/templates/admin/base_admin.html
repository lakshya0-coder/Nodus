<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Nodus Cafe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <style>
        body { background: #0a0908; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: #12100d; padding: 1.5rem 1rem; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; }
        .sidebar-logo { font-family: var(--font-heading); font-size: 1.5rem; color: var(--accent-secondary); margin-bottom: 2rem; text-align: center; }
        .nav-items { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
        .admin-nav-link { padding: 0.8rem 1rem; border-radius: var(--radius-sm); color: var(--text-secondary); transition: var(--transition); display: flex; align-items: center; gap: 10px; }
        .admin-nav-link:hover, .admin-nav-link.active { background: rgba(196, 93, 62, 0.1); color: var(--accent-primary); }
        .main-content { flex: 1; overflow-y: auto; padding: 2rem 3rem; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .user-info { display: flex; align-items: center; gap: 1rem; font-size: 0.9rem; }
        .table { width: 100%; border-collapse: collapse; background: var(--bg-card); border-radius: var(--radius-md); overflow: hidden; }
        .table th, .table td { padding: 1rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .table th { background: rgba(0,0,0,0.3); color: var(--text-secondary); font-weight: 500; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--bg-card); padding: 1.5rem; border-radius: var(--radius-md); border-left: 4px solid var(--accent-primary); }
        .stat-val { font-size: 2rem; font-weight: 700; color: var(--text-primary); margin: 0.5rem 0; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">NODUS ADMIN</div>
        <div class="nav-items">
            <a href="{{ url_for('admin.dashboard') }}" class="admin-nav-link {% if request.endpoint == 'admin.dashboard' %}active{% endif %}"><span class="icon">◱</span> Dashboard</a>
            <a href="{{ url_for('admin.orders') }}" class="admin-nav-link {% if request.endpoint == 'admin.orders' %}active{% endif %}"><span class="icon">≡</span> Orders</a>
            <a href="{{ url_for('admin.bookings') }}" class="admin-nav-link {% if request.endpoint == 'admin.bookings' %}active{% endif %}"><span class="icon">⊞</span> Bookings</a>
            <a href="{{ url_for('admin.menu') }}" class="admin-nav-link {% if request.endpoint == 'admin.menu' %}active{% endif %}"><span class="icon">⊡</span> Menu Manage</a>
            <a href="{{ url_for('admin.predictions') }}" class="admin-nav-link {% if request.endpoint == 'admin.predictions' %}active{% endif %}"><span class="icon">◠</span> Demand Forecast</a>
            <a href="{{ url_for('admin.conversations') }}" class="admin-nav-link {% if request.endpoint == 'admin.conversations' %}active{% endif %}"><span class="icon">◫</span> AI Chats</a>
        </div>
        <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.05);">
            <a href="{{ url_for('public.home') }}" class="admin-nav-link text-muted"><span class="icon">←</span> View Site</a>
            <a href="{{ url_for('auth.logout') }}" class="admin-nav-link text-muted"><span class="icon">⎋</span> Logout</a>
        </div>
    </aside>
    <main class="main-content">
        <div class="top-bar">
            <h2>{% block admin_title %}Dashboard{% endblock %}</h2>
            <div class="user-info">
                <span>{{ current_user.full_name }} ({{ current_user.role }})</span>
            </div>
        </div>
        {% block admin_content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
</body>
</html>
